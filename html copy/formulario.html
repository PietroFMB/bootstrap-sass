<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hornopirén: Paseos y Tours</title>
    <link rel="stylesheet" href="../src/custom.css">               
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<!--header -->
<header class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Hornopirén</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../public/index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="../html/servicios.html">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link" href="../html/formulario.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<!-- main -->
<main>
  <section class="container my-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-6">
        <div class="border border-dark rounded p-4 p-md-5 bg-light shadow">
          <h2 class="text-center mb-4">Contáctanos</h2>
          <form id="formulario">
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control border border-dark" id="nombre" placeholder="Ingrese su nombre" required />
            </div>
            <div class="mb-3">
              <label for="correo" class="form-label">Correo electrónico</label>
              <input type="email" class="form-control border border-dark" placeholder="Ingrese su correo" id="correo" required />
            </div>
            <div class="mb-3">
              <label for="mensaje" class="form-label">Mensaje</label>
              <textarea class="form-control border border-dark" placeholder="Ingrese su mensaje" id="mensaje" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100" data-bs-toggle="modal" data-bs-target="#modalConfirmacion">
              Enviar
            </button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <div class="modal fade" id="modalConfirmacion" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="modalLabel">Éxito</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          Formulario enviado correctamente. ¡Guardado exitosamente!
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- footer -->
<footer class="bg-primary text-white py-4 mt-4">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
        <p class="mb-2 mb-md-0">© 2025 Mi Sitio. Todos los derechos reservados.</p>
        <div class="d-flex gap-3">
            <a href="https://facebook.com" target="_blank" class="text-white">
                <i class="bi bi-facebook fs-4"></i>
            </a>
            <a href="https://instagram.com" target="_blank" class="text-white">
                <i class="bi bi-instagram fs-4"></i>
            </a>
            <a href="https://youtube.com" target="_blank" class="text-white">
                <i class="bi bi-youtube fs-4"></i>
            </a>
        </div>
    </div>
</footer>

</body>

</html>
